- date: Mar 21 2025
  time: 11:45AM – 12:45PM
  note: PGH 646A · Networks Seminar
  speaker: Alexandru Hening
  affiliation: Department of Mathematics, Texas A&M
  title: Stochastic population dynamics in discrete time
  abstract: |-
    I will present a general theory for coexistence and extinction of ecological communities that are influenced by stochastic temporal environmental fluctuations. The results apply to discrete time stochastic difference equations that can include population structure, eco-environmental feedback or other internal or external factors. Using the general theory, I will showcase some interesting examples. I will end my talk by explaining how the population size at equilibrium is influenced by environmental fluctuations.
- date: Mar 28 2025
  time: 11:45AM – 12:45PM
  note: virtual
  speaker: José Iglesias Martínez
  affiliation: Department of Applied Mathematics, University of Twente
  title: 'Kantorovich-Rubinstein norms: Sparsity and shallow neural networks'
  abstract: |-
    Variational problems in spaces of measures with total variation regularization have gained in popularity in recent years, with at least two significant drivers behind this trend. The first are formulations for linear inverse problems such as BLASSO, where the measure setting allows for their optimization through discretization-free conditional gradient methods, and sparsity and super-resolution results on the solutions arising from noisy measurements. The second is the ability to formulate regression problems with shallow neural networks in a convex fashion, the corresponding spaces of Barron functions and their reproducing kernel Banach space structure.

    In this talk, we explore the use in these formulations of Kantorovich-Rubinstein norms, defined by testing with Lipschitz functions instead of general continuous ones, and reflecting unbalanced optimal transport. For them, we are able to obtain a full characterization of extremal points of the unit ball and strong compactness results. These in turn allow to maintain sparsity results and the use of sparse optimisation methods, while providing additional interpretation on the convergence of learning problems. From an application perspective, an additional shifted KR norm term allows for injecting a priori spatial information in inverse problems, and modelling distillation/fusion of infinitely wide shallow networks.
- date: Apr 11 2025
  time: 11:45AM – 12:45PM
  note: PGH 646A
  speaker: Tom Needham
  affiliation: Mathematics Department, Florida State University
  title: Generalized Gromov-Wasserstein Distances and Network Analysis
  abstract: |-
    The Gromov-Wasserstein (GW) distances comprise a family of metrics which can be used to compare abstract metric measure spaces. They are defined by applying ideas from optimal transport theory to give an L^p version of the well-known Gromov-Hausdorff distance. In recent years, GW distances have been successfully applied to a wide variety of network analysis tasks, from network alignment, to community detection, to dictionary learning for ensembles of networks. I will give an overview of properties of GW distances and describe various generalizations, including a version which is able to compare kernels valued in arbitrary metric spaces. This latter version has applications to attributed graphs and "shape graphs", where the edges of the graph are considered as embedded shapes.
